<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecargasGames</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

header{
    background:#00ffcc;
    color:black;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.section-title{
    margin:10px;
    font-size:18px;
    color:#00ffcc;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:#151515;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card.selected{
    border:2px solid #00ffcc;
    background:#002f2a;
}

.price{
    color:#00ffcc;
    font-weight:bold;
}

.box{
    background:#151515;
    margin:15px;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

input,select{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
}

button{
    width:90%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
}

#infoPago{
    margin-top:10px;
    font-size:14px;
    background:#1a1a1a;
    padding:10px;
    border-radius:8px;
}

#whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    padding:18px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>💎 RECARGAS GAMES</header>

<div class="section-title">💎 Diamantes</div>
<div class="grid" id="diamantes"></div>

<div class="section-title">🎟 Tarjetas y Pases</div>
<div class="grid" id="tarjetas"></div>

<div class="box">

<input type="text" id="ffid" placeholder="ID de Free Fire">

<select id="metodo" onchange="mostrarPago(); calcular();">
<option value="">Método de pago</option>
<option value="Binance">Binance</option>
<option value="Pago Móvil">Pago Móvil</option>
</select>

<p id="infoPago"></p>

<h3 id="total"></h3>

<!-- REFERENCIA MANUAL -->
<input type="text" id="ref" placeholder="Ingresa la referencia del pago">

<button onclick="enviar()">Enviar Pedido</button>

</div>

<div id="whatsapp" onclick="soporte()">💬</div>

<script>
let tasa = 660;

let diamantes = [
["110💎",0.97],
["220💎",1.96],
["341💎",3.20],
["572💎",4.89],
["1166💎",9],
["2398💎",19],
["6160💎",48]
];

let tarjetas = [
["T. Semanal Básica",0.73],
["T. Semanal",2.50],
["T. Mensual",11],
["Pase Booyah",3.5],
["Pase de Nivel",4]
];

let producto="";
let precio=0;

function crearProductos(lista, contenedor){
    let cont = document.getElementById(contenedor);

    lista.forEach(item=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerHTML=`${item[0]}<br><span class="price">$${item[1]}</span>`;

        div.onclick=()=>{
            document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
            div.classList.add("selected");
            producto=item[0];
            precio=item[1];
            calcular();
        };

        cont.appendChild(div);
    });
}

crearProductos(diamantes,"diamantes");
crearProductos(tarjetas,"tarjetas");

function calcular(){
    if(!precio) return;

    let metodo=document.getElementById("metodo").value;

    if(metodo==="Pago Móvil"){
        document.getElementById("total").innerHTML =
        "💰 "+(precio*tasa).toFixed(2)+" Bs";
    } else {
        document.getElementById("total").innerHTML =
        "💰 $"+precio;
    }
}

function mostrarPago(){
    let metodo = document.getElementById("metodo").value;

    if(metodo==="Binance"){
        document.getElementById("infoPago").innerHTML =
        "💳 <b>Binance Pay</b><br>ID: 964617189";
    }
    else if(metodo==="Pago Móvil"){
        document.getElementById("infoPago").innerHTML =
        "🏦 <b>Banco de Venezuela</b><br>" +
        "C.I: 32.824.869<br>" +
        "Tlf: 0422-824-2411";
    }
    else{
        document.getElementById("infoPago").innerHTML="";
    }
}

function enviar(){
    let id=document.getElementById("ffid").value;
    let metodo=document.getElementById("metodo").value;
    let ref=document.getElementById("ref").value;

    if(!id||!metodo||!producto){
        alert("⚠️ Completa los datos");
        return;
    }

    if(ref.length < 4){
        alert("⚠️ Ingresa una referencia válida");
        return;
    }

    let total=document.getElementById("total").innerText;

    let msg="🔥 *RECARGAS GAMES* 🔥%0A%0A";
    msg+="🎮 ID: "+id+"%0A";
    msg+="💎 Producto: "+producto+"%0A";
    msg+="💰 Total: "+total+"%0A";
    msg+="💳 Método: "+metodo+"%0A";
    msg+="🧾 Ref: "+ref;

    window.location.href="https://wa.me/584228242411?text="+msg;
}

function soporte(){
    window.location.href="https://wa.me/584228242411?text=Hola necesito ayuda";
}
</script>

</body>
</html>
